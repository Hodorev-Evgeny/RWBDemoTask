services:
  nats:
    image: nats:2.14.1-alpine
    container_name: trends-nats
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  nats-box:
    image: natsio/nats-box:0.19.5
    container_name: trends-nats-box
    depends_on:
      - nats
    command: ["sleep", "infinity"]
    environment:
      NATS_URL: nats://nats:4222